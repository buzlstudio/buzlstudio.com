<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelChef - Recipe from Reels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fafafa;
            min-height: 100vh;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 3rem 2rem; }
        .back { color: #888; text-decoration: none; font-size: 0.9rem; }
        .back:hover { color: #fafafa; }
        .hero { text-align: center; margin: 3rem 0; }
        .app-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #ff6b35, #ff8f65);
            border-radius: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2.5rem; margin-bottom: 1.5rem;
        }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { color: #888; font-size: 1.1rem; margin-bottom: 2rem; }
        .links {
            display: flex; gap: 1rem; justify-content: center;
            flex-wrap: wrap; margin-top: 2rem;
        }
        .links a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #161616;
            border: 1px solid #222;
            border-radius: 10px;
            color: #fafafa;
            text-decoration: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .links a:hover { border-color: #ff6b35; }
        footer {
            text-align: center;
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #555;
        }
        footer a { color: #666; text-decoration: none; }
        footer a:hover { color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/">&larr; Buzl Studio</a>
        <div class="hero">
            <img class="app-icon" src="/assets/reelchef-icon.png" alt="ReelChef">
            <h1>ReelChef</h1>
            <p class="subtitle">Extract structured recipes from Instagram Reels using AI. Save, organize, and cook with ease.</p>
        </div>
        <div class="links">
            <a href="terms">Terms of Use</a>
            <a href="privacy">Privacy Policy</a>
            <a href="mailto:support@buzlstudio.com">Support</a>
        </div>
        <footer>
            &copy; 2026 Buzl Studio &middot;
            <a href="mailto:support@buzlstudio.com">support@buzlstudio.com</a>
        </footer>
    </div>
</body>
</html>
