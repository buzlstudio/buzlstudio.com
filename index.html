<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzl Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #050a14;
            color: #e8f0fe;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(56, 182, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(120, 200, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(56, 182, 255, 0.03) 0%, transparent 70%);
            animation: aurora 15s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes aurora {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-2%, 1%) rotate(1deg); }
            100% { transform: translate(1%, -1%) rotate(-1deg); }
        }
        .frost-particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(150, 210, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .frost-particle:nth-child(1) { top: 15%; left: 20%; animation: float 8s ease-in-out infinite; }
        .frost-particle:nth-child(2) { top: 30%; left: 75%; animation: float 11s ease-in-out infinite 2s; width: 2px; height: 2px; }
        .frost-particle:nth-child(3) { top: 65%; left: 15%; animation: float 9s ease-in-out infinite 4s; }
        .frost-particle:nth-child(4) { top: 80%; left: 60%; animation: float 13s ease-in-out infinite 1s; width: 4px; height: 4px; opacity: 0.3; }
        .frost-particle:nth-child(5) { top: 45%; left: 85%; animation: float 10s ease-in-out infinite 3s; width: 2px; height: 2px; }
        .frost-particle:nth-child(6) { top: 10%; left: 55%; animation: float 12s ease-in-out infinite 5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.4; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 0.7; }
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .logo span {
            background: linear-gradient(135deg, #38b6ff, #7ec8e3, #38b6ff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoShimmer 4s ease-in-out infinite;
        }
        @keyframes logoShimmer {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }
        .tagline {
            font-size: 1.1rem;
            color: #6b8aad;
            margin-bottom: 3rem;
        }
        .apps { margin-bottom: 3rem; }
        .app-card {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: rgba(15, 25, 45, 0.7);
            border: 1px solid rgba(56, 182, 255, 0.15);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #e8f0fe;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .app-card:hover {
            border-color: rgba(56, 182, 255, 0.4);
            box-shadow: 0 0 20px rgba(56, 182, 255, 0.1);
            transform: translateY(-2px);
        }
        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            position: relative;
        }
        .app-card .app-icon-wrap {
            position: relative;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }
        .app-card .app-icon-wrap::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -50%;
            width: 200%;
            height: calc(100% + 4px);
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
            animation: shimmer 3s ease-in-out infinite;
            pointer-events: none;
            border-radius: 12px;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }
        .app-info { text-align: left; }
        .app-name { font-weight: 600; font-size: 1rem; }
        .app-desc { font-size: 0.85rem; color: #6b8aad; }
        footer {
            position: fixed;
            bottom: 2rem;
            font-size: 0.8rem;
            color: #3a5070;
            z-index: 1;
        }
        footer a { color: #4a6a90; text-decoration: none; }
        footer a:hover { color: #38b6ff; }
    </style>
</head>
<body>
    <div class="frost-particle"></div>
    <div class="frost-particle"></div>
    <div class="frost-particle"></div>
    <div class="frost-particle"></div>
    <div class="frost-particle"></div>
    <div class="frost-particle"></div>

    <div class="container">
        <div class="logo"><span>Buzl</span> Studio</div>
        <p class="tagline">Crafting mobile experiences</p>
        <div class="apps">
            <a class="app-card" href="/reelchef/">
                <div class="app-icon-wrap">
                    <img class="app-icon" src="/assets/reelchef-icon.png" alt="ReelChef">
                </div>
                <div class="app-info">
                    <div class="app-name">ReelChef</div>
                    <div class="app-desc">Recipe discovery powered by AI</div>
                </div>
            </a>
        </div>
    </div>
    <footer>
        &copy; 2026 Buzl Studio &middot;
        <a href="mailto:support@buzlstudio.com">Contact</a>
    </footer>
</body>
</html>
